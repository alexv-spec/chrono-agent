<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #0d1d31 0%, #0c0d13 100%);
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        .stars, .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            z-index: -1;
        }

        .stars {
            background: #000 url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48Y2lyY2xlIGN4PSI2IiBjeT0iMTQiIHI9IjEiIGZpbGw9IndoaXRlIiAvPjxjaXJjbGUgY3g9IjE2MCIgY3k9IjYwIiByPSIxLjUiIGZpbGw9IndoaXRlIiAvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMjAwIiByPSIxLjIiIGZpbGw9IndoaXRlIiAvPjxjaXJjbGUgY3g9IjI4MCIgY3k9IjE4MCIgcj0iMSIgZmlsbD0id2hpdGUiIC8+PC9zdmc+');
            background-size: 300px 300px;
            animation: starsAnim 200s linear infinite;
            opacity: 0.8;
        }

        .twinkling {
            background: transparent url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MDAiIGhlaWdodD0iNTAwIj48Y2lyY2xlIGN4PSIxMCIgY3k9IjUwIiByPSIyIiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjUiIC8+PC9zdmc+');
            background-size: 500px 500px;
            animation: twinklingAnim 4s infinite alternate;
        }

        @keyframes starsAnim {
            from { transform: translateY(0px); }
            to { transform: translateY(-1000px); }
        }

        @keyframes twinklingAnim {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .glitch-title {
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            margin: 1.5rem 0;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            animation: glitch 3s infinite;
            text-shadow: 
                0 0 5px #00ffff,
                0 0 10px #ff00ff,
                0 0 20px #ffff00,
                2px 2px 0 #ff0000;
        }

        @keyframes glitch {
            0% { text-shadow: 0 0 5px #00ffff, 0 0 10px #ff00ff, 2px 2px 0 #ff0000; }
            25% { text-shadow: -2px 0 5px #ff00ff, 2px 2px 10px #00ffff, -2px -2px 0 #ffff00; }
            50% { text-shadow: 2px 2px 10px #ffff00, -2px -2px 5px #ff0000, 0 0 20px #00ffff; }
            75% { text-shadow: 0 0 20px #ff0000, 2px 2px 5px #ffff00, -2px 0 10px #ff00ff; }
            100% { text-shadow: 0 0 5px #00ffff, 0 0 10px #ff00ff, 2px 2px 0 #ff0000; }
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .nav-panel {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0 3rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            border-color: #00ffff;
            box-shadow: 0 0 30px #00ffff;
            background: rgba(0, 50, 80, 0.8);
        }

        .content-card {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 30px;
        }

        .game-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lives { display: flex; gap: 10px; }
        .heart { font-size: 2rem; filter: drop-shadow(0 0 10px #ff3366); transition: 0.3s; }
        .heart.empty { opacity: 0.3; filter: grayscale(1); }
        .combo { font-size: 2rem; font-weight: bold; color: #ffaa00; text-shadow: 0 0 20px #ffaa00; }
        .score { font-size: 2rem; color: #00ffff; text-shadow: 0 0 20px cyan; }

        .period-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .period-card {
            background: rgba(50, 20, 70, 0.8);
            border-radius: 30px;
            padding: 20px 10px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .period-card:hover {
            border-color: #ff00ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px #ff00ff80;
        }
        .period-icon { font-size: 2.5rem; }
        .period-highscore {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 1rem;
            color: #ffd966;
        }

        .question-box { text-align: center; padding: 20px; }
        .question-text { font-size: 2rem; margin-bottom: 30px; color: #fff; text-shadow: 0 0 10px cyan; }
        .options { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 15px;
            font-size: 1.3rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover:not(:disabled) {
            background: rgba(0, 255, 255, 0.3);
            border-color: cyan;
            transform: scale(1.02);
        }
        .option-btn.correct { background: rgba(0, 255, 0, 0.4); border-color: lime; animation: pulse 0.5s; }
        .option-btn.wrong { background: rgba(255, 0, 0, 0.4); border-color: red; animation: shake 0.3s; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .feedback { margin-top: 20px; font-size: 1.8rem; min-height: 60px; }
        .portal-effect { animation: portalGlow 2s infinite; }
        @keyframes portalGlow { 0% { box-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff; } 50% { box-shadow: 0 0 60px #ffff00, 0 0 90px #ff00ff; } 100% { box-shadow: 0 0 30px #00ffff, 0 0 60px #ffff00; } }

        .terms-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .term-item {
            background: rgba(0, 20, 40, 0.7);
            border-radius: 20px;
            padding: 15px;
            border-left: 5px solid cyan;
        }
        .term-name { font-size: 1.4rem; font-weight: bold; color: cyan; }
        .term-def { margin-top: 8px; color: #ccc; }

        .stats { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; margin: 30px 0; }
        .stat-card { background: rgba(255,255,255,0.1); border-radius: 30px; padding: 25px 40px; text-align: center; min-width: 180px; }
        .stat-value { font-size: 3rem; font-weight: 900; color: cyan; }
        .comment { font-size: 2rem; text-align: center; padding: 20px; background: rgba(255,0,255,0.2); border-radius: 60px; margin-top: 20px; }

        .back-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .back-btn:hover { background: white; color: black; }
        .hidden { display: none; }

        @media (max-width: 600px) {
            .glitch-title { font-size: 2.5rem; }
            .nav-btn { font-size: 1.2rem; padding: 12px 25px; }
            .game-hud { flex-direction: column; gap: 10px; }
        }
    </style>
</head>

            // ---------- БИБЛИОТЕКА ТЕРМИНОВ ----------

            // ---------- ИГРОВОЕ СОСТОЯНИЕ ----------
            let currentView = 'missions';

            // Рекорды по уровням (в localStorage)
            let highScores = JSON.parse(localStorage.getItem('hronoHighScores') || '{}');

            // Статистика пользователя
            let stats = { total: 0, correct: 0, wrong: 0 };
            function loadStats() { const saved = localStorage.getItem('hronoStats'); if (saved) { try { stats = JSON.parse(saved); } catch(e) {} } }
            function saveStats() { localStorage.setItem('hronoStats', JSON.stringify(stats)); }
            loadStats();

            function updateHighScore(periodId, finalScore) {
                if (!highScores[periodId] || finalScore > highScores[periodId]) {
                    highScores[periodId] = finalScore;
                    localStorage.setItem('hronoHighScores', JSON.stringify(highScores));
                }
            }

            // Звуки
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;
            function playSound(type) {
                if (!AudioContext) return;
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                switch(type) {
                    case 'correct':
                        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                        break;
                    case 'wrong':
                        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                        break;
                    case 'portal':
                        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.3);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                        break;
                }
            }

            // Перемешивание массива (алгоритм Фишера-Йетса)
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // Перемешивание вариантов ответа в вопросе
            function shuffleOptions(q) {
                const correctAnswer = q.options[q.correct];
                const shuffled = shuffleArray([...q.options]);
                const newCorrectIndex = shuffled.indexOf(correctAnswer);
                return { ...q, options: shuffled, correct: newCorrectIndex };
            }

            // Очистка таймера перед любым переходом

            function renderMissions() {
                let html = '<h2 style="text-align:center; margin-bottom:30px;">🌍 Выбери историческую миссию</h2><div class="period-grid">';

                    const high = highScores[p.id] || 0;
                    html += `
                        <div class="period-card" data-period="${p.id}">
                            <span class="period-icon">${p.icon}</span>
                            <span>${p.name}</span>
                            <span class="period-highscore">🏆 ${high}</span>

                html += '</div>';
                contentDiv.innerHTML = html;
                document.querySelectorAll('.period-card').forEach(card => {
                    card.addEventListener('click', () => startMission(card.dataset.period));
                });
            }

            function startMission(periodId) {
                clearQuestionTimeout();   // убиваем старый таймер, если был
                lives = MAX_LIVES;
                score = 0;
                combo = 0;
                streak = 0;
                correctAnswersInMission = 0;
                answered = false;         // явно сбрасываем флаг ответа
                currentMission = periodId;
                currentQuestionIndex = 0;
                // Копируем массив вопросов и перемешиваем его порядок
                missionQuestions = shuffleArray([...questionsDB[periodId]]);
                if (missionQuestions.length === 0) {
                    alert('❌ В этом периоде пока нет вопросов');
                    return;
                }
                renderQuestion();
            }

            function renderQuestion() {
                if (currentQuestionIndex >= missionQuestions.length && lives > 0) {
                    if (correctAnswersInMission >= 8) {
                        showBonusQuestion();
                    } else {
                        showMissionComplete();
                    }
                    return;
                }
                if (lives <= 0) { showGameOver(); return; }

                let q = missionQuestions[currentQuestionIndex];
                q = shuffleOptions(q);

                let html = `
                    <button class="back-btn" id="back-from-question">← К выбору миссии</button>
                    <div class="game-hud">
                        <div class="lives">${[...Array(MAX_LIVES)].map((_,i)=>`<span class="heart ${i<lives?'':'empty'}">❤️</span>`).join('')}</div>
                        <div class="combo">x${combo}</div>
                        <div class="score">⭐ ${score}</div>
                    </div>
                    <div class="question-box">
                        <div class="question-text">${q.question}</div>
                        <div class="options" id="options-container">
                `;
                q.options.forEach((opt, idx) => {
                    html += `<button class="option-btn" data-opt-index="${idx}">${opt}</button>`;
                });
                html += `   </div>
                        <div id="question-feedback" class="feedback"></div>
                    </div>
                `;
                contentDiv.innerHTML = html;

                document.getElementById('back-from-question').addEventListener('click', () => {
                    clearQuestionTimeout();
                    currentMission = null;
                    renderMissions();
                });

                const optionBtns = document.querySelectorAll('.option-btn');
                optionBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (answered) return;
                        const selected = parseInt(e.target.dataset.optIndex);
                        const isCorrect = (selected === q.correct);

                        optionBtns.forEach((b, i) => {
                            if (i === q.correct) b.classList.add('correct');
                            else if (i === selected && !isCorrect) b.classList.add('wrong');
                        });

                        if (isCorrect) {
                            playSound('correct');
                            const points = 100 * (combo + 1);
                            score += points;
                            stats.correct++;
                            correctAnswersInMission++;
                            streak++;
                            combo = Math.min(streak, 3);
                            if (lives < MAX_LIVES) lives++;
                        } else {
                            playSound('wrong');
                            stats.wrong++;
                            lives--;
                            streak = 0;
                            combo = 0;
                        }
                        stats.total++;
                        saveStats();

                        answered = true;
                        const feedbackDiv = document.getElementById('question-feedback');
                        feedbackDiv.textContent = isCorrect ? '✅ Верно!' : `❌ Неверно. Правильный ответ: ${q.options[q.correct]}`;

                        // Сохраняем таймер и очищаем его при перезапуске
                        clearQuestionTimeout();
                        currentTimeout = setTimeout(() => {
                            if (lives <= 0) {
                                showGameOver();
                            } else {
                                currentQuestionIndex++;
                                answered = false;
                                renderQuestion();
                            }
                            currentTimeout = null;
                        }, 1500);
                    });
                });
            }

            function renderTerms() {
                let html = '<h2 style="text-align:center;">📚 Большая библиотека знаний</h2><div class="terms-list">';
                termsLibrary.forEach(item => {
                    html += `<div class="term-item"><span class="term-name">${item.term}</span> <span class="term-def">${item.definition}</span></div>`;
                });
                const dates = [
                    '862 — призвание варягов', '988 — крещение Руси', '1223 — битва на Калке',
                    '1240 — Невская битва', '1242 — Ледовое побоище', '1380 — Куликовская битва',
                    '1480 — стояние на Угре', '1547 — венчание Ивана IV', '1552 — взятие Казани',
                    '1581 — введение заповедных лет', '1598 — начало Смуты', '1612 — освобождение Москвы',
                    '1613 — воцарение Романовых', '1649 — Соборное уложение', '1654 — Переяславская рада',
                    '1670-1671 — восстание Разина', '1700-1721 — Северная война', '1703 — основание Петербурга',
                    '1721 — провозглашение империи', '1725-1762 — эпоха дворцовых переворотов',
                    '1755 — основание МГУ', '1762 — манифест о вольности дворянства', '1773-1775 — восстание Пугачёва',
                    '1812 — Отечественная война', '1825 — восстание декабристов', '1861 — отмена крепостного права'
                ];
                dates.forEach(d => {
                    html += `<div class="term-item"><span class="term-name">📅</span> <span class="term-def">${d}</span></div>`;
                });
                html += '</div>';
                contentDiv.innerHTML = html;
            }

            function renderProfile() {
                const total = stats.total || 0;
                const correct = stats.correct || 0;
                const wrong = stats.wrong || 0;
                const percentWrong = total ? Math.round((wrong / total) * 100) : 0;
                let comment = '';
                if (total === 0) comment = '🚀 Начни своё первое путешествие во времени!';
                else if (percentWrong <= 20) comment = '🌟 Легендарный агент! Ты меняешь историю!';
                else if (percentWrong <= 40) comment = '👍 Хорошая работа, но впереди новые вызовы.';
                else if (percentWrong <= 60) comment = '🤔 Временная линия искажается... Изучи термины.';
                else comment = '💪 Даже мастера ошибаются. Попробуй ещё!';

                let html = `
                    <h2 style="text-align:center;">👤 Личный кабинет</h2>
                    <div class="stats">
                        <div class="stat-card"><div class="stat-value">${total}</div><div>всего ответов</div></div>
                        <div class="stat-card"><div class="stat-value">${correct}</div><div>✅ верно</div></div>
                        <div class="stat-card"><div class="stat-value">${wrong}</div><div>❌ ошибок</div></div>
                        <div class="stat-card"><div class="stat-value">${percentWrong}%</div><div>ошибок</div></div>
                    </div>
                    <div class="comment">${comment}</div>
                    <button class="back-btn" id="reset-stats" style="display:block;margin:30px auto 0;">♻️ Сбросить прогресс</button>
                `;
                contentDiv.innerHTML = html;
                document.getElementById('reset-stats')?.addEventListener('click', () => {
                    if (confirm('Сбросить всю статистику?')) {
                        stats = { total: 0, correct: 0, wrong: 0 };
                        saveStats();
                        renderProfile();
                    }
                });
            }

            const contentDiv = document.getElementById('content-area');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    clearQuestionTimeout();
                    currentView = e.target.dataset.view;
                    currentMission = null;
                    render();
                });
            });

            render();
        })();
    </script>
</body>
</html>
